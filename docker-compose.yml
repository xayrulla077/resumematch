version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: resume_db
    restart: always
    environment:
      POSTGRES_USER: resume_user
      POSTGRES_PASSWORD: secure_password_here
      POSTGRES_DB: resume_matcher
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resume_user -d resume_matcher"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    environment:
      - DATABASE_URL=postgresql://resume_user:secure_password_here@db:5432/resume_matcher
      - SECRET_KEY=your_super_secret_production_key_here
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - ENVIRONMENT=production
      - ALLOWED_ORIGINS=http://localhost:3000,http://your-domain.com

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: resume_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
